<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Successful</title>
<style>

<body>
  <div class="box">
    <div class="check">✅</div>

  </div>

</html>
